<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Magic AR Hands - Interactive Augmented Reality</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        <video id="video" playsinline style="display:none;"></video>
        <canvas id="drawingCanvas" style="position:absolute;top:0;left:0;display:none;"></canvas>
        
        <!-- Control Panel -->
        <div id="controlPanel" class="control-panel">
            <div class="panel-header">✨ AI MAGIC HANDS ✨</div>
            
            <div class="panel-section">
                <label>Mode:</label>
                <select id="modeSelect" class="control-input">
                    <option value="air-screen">Air Screen</option>
                    <option value="doctor-strange">Doctor Strange</option>
                    <option value="portal">Portal</option>
                    <option value="fire">Fire Trail</option>
                    <option value="lightning">Lightning</option>
                    <option value="telekinesis">Telekinesis</option>
                    <option value="iron-man">Iron Man HUD</option>
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="glitch">Glitch</option>
                </select>
            </div>
            
            <div class="panel-section">
                <label>Color Scheme:</label>
                <div class="color-picker">
                    <button class="color-btn" data-color="#00ff88" style="background:#00ff88;"></button>
                    <button class="color-btn" data-color="#0088ff" style="background:#0088ff;"></button>
                    <button class="color-btn" data-color="#ff0088" style="background:#ff0088;"></button>
                    <button class="color-btn" data-color="#ff8800" style="background:#ff8800;"></button>
                    <button class="color-btn" data-color="#8800ff" style="background:#8800ff;"></button>
                    <button class="color-btn" data-color="#ffff00" style="background:#ffff00;"></button>
                </div>
            </div>
            
            <div class="panel-section">
                <label>Particle Count: <span id="particleCountValue">500</span></label>
                <input type="range" id="particleCount" min="100" max="2000" value="500" class="control-input">
            </div>
            
            <div class="panel-section">
                <label>Speed: <span id="speedValue">1.0</span></label>
                <input type="range" id="speed" min="0.5" max="3" value="1.0" step="0.1" class="control-input">
            </div>
            
            <div class="panel-section">
                <label>Brightness: <span id="brightnessValue">1.0</span></label>
                <input type="range" id="brightness" min="0.5" max="2" value="1.0" step="0.1" class="control-input">
            </div>
            
            <div class="panel-section">
                <label>Quality:</label>
                <select id="qualitySelect" class="control-input">
                    <option value="low">Low (Better Performance)</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High (High VRAM)</option>
                </select>
            </div>
            
            <div class="panel-section button-group">
                <button id="screenshotBtn" class="control-button">📸 Screenshot</button>
                <button id="recordBtn" class="control-button">⏹ Record</button>
            </div>
            
            <div class="panel-section button-group">
                <button id="fullscreenBtn" class="control-button">⛶ Fullscreen</button>
                <button id="resetBtn" class="control-button">🔄 Reset</button>
            </div>
            
            <div class="stats-panel">
                <div id="fps">FPS: 0</div>
                <div id="handStatus">Hands: Waiting...</div>
                <div id="gestureStatus">Gesture: None</div>
            </div>
        </div>
        
        <!-- Performance Overlay -->
        <div id="performanceOverlay" class="performance-overlay">
            <div id="performanceText">FPS: 0 | Particles: 0 | Hands: 0</div>
        </div>
        
        <!-- Gesture Overlay -->
        <div id="gestureOverlay" class="gesture-overlay"></div>
    </div>
    
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/EffectComposer.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/RenderPass.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/ShaderPass.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/shaders/CopyShader.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/shaders/GodRaysShader.js"></script>
    
    <script src="js/shaders.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/handTracker.js"></script>
    <script src="js/gestureManager.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
